# App
agent_os_dir: "~/Library/Mobile Documents/com~apple~CloudDocs/Lincy"
debug: true
show_tool_use: true
warn_on_failure: false
timezone: "UTC+8"            # supports fixed offsets (UTC+8) or IANA names (Asia/Taipei)

# Context window management
context:
  max_chars: 128000
  preserve_turns: 12
  # Core rules: high attention weight, injected as system message
  boot_files:
    - "memory/agent/persona.md"
    - "memory/agent/long-term.md"
    - "memory/agent/skills/index.md"
  # Background reference: injected as synthetic tool result
  boot_files_as_tool:
    - "memory/agent/recent.md"
    - "memory/agent/pending-thoughts.md"
    - "memory/agent/interests/index.md"
  # Time-anchored common ground:
  # when a queued inbound message is processed after this scope's shared context changed,
  # inject a synthetic tool-result block describing what was already shared at message time.
  common_ground:
    enabled: true
    mode: auto_on_rev_mismatch         # V1: inject only when anchor_shared_rev != turn-start current rev
    max_entries: 8                     # most recent shared messages to include (still filtered by rev<=anchor)
    max_chars: 800                    # char budget for the injected common-ground block
    max_entry_chars: 100               # per-entry body truncation before block assembly
    persist_cache: true                # persist shared_state.json cache under memory/cache/
    rebuild_from_sessions_on_cache_miss: true  # best-effort replay from session JSONL when cache missing/corrupt

# Session persistence
session:
  replay_turns: null             # resume 時顯示最近 N 輪，null = 全部
  show_tool_calls: true          # resume 時是否顯示 tool call 細節

# Lifecycle hooks
hooks:
  memory_archive:
    retain_days: 1
  memory_backup:
    enabled: true
    interval_minutes:  300        # backup interval (minutes)
    retention_minutes: 1440     # cleanup threshold (minutes), 1440 = 24h
  session_cleanup:
    enabled: true
    retention_days: 3          # session retention (days)
  context_refresh:
    enabled: true
    interval_hours: 1           # refresh interval (hours)
    on_day_change: true         # also refresh on date change
    preserve_turns: 12          # turns to keep after compaction

# Feature flags
features:
  copilot_agent_hint: true
  copilot_brain_staged_planning: false # Copilot brain: see -> think -> act (plan visible in TUI, not in conversation history)

# Channel adapters
channels:
  gmail:
    enabled: true
    poll_interval: 5          # seconds between inbox polls
    max_age_minutes: null      # null = no limit; set to e.g. 30 to skip old emails
    thread_max_age_days: 7     # stale threshold for thread continuation (days)
    ignore_senders:            # substring match, auto-archive without processing
      - "@facebookmail.com"
      - "noreply@"
      - "no-reply@"
      - "@accounts.google.com"
  discord:
    enabled: true
    debounce_seconds: 5
    max_wait_seconds: 30
    dm_debounce_seconds: 12          # DM waits longer before assuming you're done
    dm_max_wait_seconds: 180         # hard cap for one DM burst (slow typers)
    dm_typing_quiet_seconds: 15      # quiet time after last typing event
    send_delay_min: 1.0
    send_delay_max: 3.0
    listen_dms: true
    listen_channels: []        # optional hard allowlist / bootstrap seeds
    ignore_users: []
    guild_review_interval_seconds: 60
    thinking_typing: true
    thinking_typing_refresh_seconds: 7
    presence_mode: auto              # off | auto | keep_online (auto only bumps online)
    presence_refresh_seconds: 90     # refresh Discord presence periodically
    presence_idle_after_seconds: 300 # reserved (auto currently does not force idle)
    auto_read_images: true
    auto_read_images_in_dm: true
    auto_read_images_in_guild: true
    auto_read_image_max_per_batch: 3
    auto_read_image_max_mb: 10
  line_crack:
    enabled: false              # opt-in, macOS only
    poll_interval: 30           # seconds between badge checks
    screenshot_max_width: 1280  # resize before Vision LLM
    screenshot_quality: 80      # JPEG quality
    scroll_similarity_threshold: 0.995
    max_scroll_captures: 20     # safety limit

# Control API (for supervisor integration)
control:
  enabled: true
  host: "127.0.0.1"
  port: 9001

# Autonomous heartbeat
heartbeat:
  enabled: true
  enqueue_startup: true        # default false; true to enqueue immediate [STARTUP] on launch
  interval: "10m-30m"            # format: "<n>[m|h]-<n>[m|h]", e.g. "3m-5m", "2h-5h", "1h-30m"
  # interval: "1h-30m"

# Tool security
tools:
  max_tool_iterations: 25           # max tool call iterations per turn
  allowed_paths:
    - "~"
    - "/tmp"
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 1200
    export_env:                  # keys from .env to inject into shell subprocess
      - GEMINI_API_KEY
  memory_edit:
    allow_failure: true
    turn_retry_limit: 3                  # responder turn-level retry when memory_edit tool result is failed
    warnings:
      max_lines: 150
      ignore:
        - "recent.md"
        - "index.md"
        - "agent/skills/"
        - "journal/"
  memory_search:
    bm25:
      top_k: 8
      snippet_lines: 3
      max_snippets_per_file: 3
      max_response_chars: 1200
      date_normalization: true
    # agent fallback: when agents.memory_searcher.enabled is true,
    # uses LLM-based search instead of BM25
    agent:
      allow_failure: true
  scroll:
    invert: false
    max_amount: 4

# Agents
agents:
  brain:
    llm: llm/copilot/claude-opus-4.6-fast/thinking.yaml
    llm_request_timeout: 180
    llm_transient_retries: 2
    warn_on_failure: true
    use_own_vision_ability: false

  init:
    llm: llm/copilot/gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_transient_retries: 1
    warn_on_failure: true

  memory_searcher:
    enabled: false                  # true = LLM search, false = BM25
    llm: llm/copilot/gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_transient_retries: 1
    warn_on_failure: true
    pre_parse_retries: 1
    context_bytes_limit: 600
    max_results: null

  vision:
    enabled: true
    llm: llm/copilot/gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 60
    llm_transient_retries: 1
    warn_on_failure: true

  memory_editor:
    enabled: true
    llm: llm/copilot/claude-opus-4.6-fast/thinking.yaml
    llm_request_timeout: 120
    llm_transient_retries: 2             # transport/transient retry (timeout, 5xx, malformed provider payload)
    llm_rate_limit_retries: 5            # 429 retry with Retry-After/backoff
    warn_on_failure: true
    post_parse_retries: 2                # planner JSON/schema parse retry (different layer from transport retry)

  gui_manager:
    enabled: true
    llm: llm/copilot/claude-opus-4.6-fast/thinking.yaml
    llm_request_timeout: 180
    llm_transient_retries: 2
    warn_on_failure: true
    max_steps: 50                            # GUI agentic loop 最大步數
    gui_intent_max_chars: null               # gui_task 意圖顯示截斷
    gui_instruction_max_chars: null          # ask_worker 指令顯示截斷（null=不截斷）
    gui_text_max_chars: null                 # type_text 文字顯示截斷（null=不截斷）
    gui_worker_result_max_chars: null        # worker 觀察結果顯示截斷（null=不截斷）
    gui_result_max_chars: null               # 一般結果顯示截斷（null=不截斷）
    screenshot_max_width: 1080               # 截圖最大寬度（等比縮放）
    screenshot_quality: 70                   # JPEG 壓縮品質（1-100）

  gui_worker:
    enabled: true
    llm: llm/copilot/gemini-3-flash-preview/thinking.yaml
    llm_request_timeout: 60
    llm_transient_retries: 1
    warn_on_failure: true
