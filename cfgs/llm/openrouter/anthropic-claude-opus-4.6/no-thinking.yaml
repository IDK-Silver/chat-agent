provider: openrouter
api_key_env: OPENROUTER_API_KEY
base_url: https://openrouter.ai/api/v1
site_url: https://chat-agent.local
# null = app.openrouter_site_name or agent name fallback.
site_name: null
model: anthropic/claude-opus-4.6

# OpenRouter model metadata ceiling: 128000 output tokens.
# Keep this profile in the range 1..128000.
max_tokens: 8192
# HTTP timeout in seconds. null = client default.
request_timeout: null
# Sampling temperature. OpenRouter docs: 0.0 to 2.0. null = provider default.
temperature: null
# Whether the app may send image inputs to this profile.
vision: true

# Pin Anthropic for stable behavior and cache locality.
provider_routing:
  order:
    - anthropic
  allow_fallbacks: false

# Claude Opus 4.6 supports adaptive thinking and output effort.
reasoning:
  # Disables provider-side reasoning/thinking.
  enabled: false
  # OpenRouter reasoning budgets must be >= 1024 and stay below max_tokens.
  # If you re-enable thinking in this profile, practical range is 1024..8191.
  max_tokens: null
  # Claude 4.6 does not use OpenRouter reasoning.effort for thinking control.
  effort: null
  # Keep empty to reject generic effort on Claude 4.6 profiles.
  supported_efforts: []

# OpenRouter top-level output/detail control.
# Allowed values for Claude 4.6: low, medium, high, max.
verbosity: null
