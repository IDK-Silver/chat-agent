provider: openrouter
api_key_env: OPENROUTER_API_KEY
base_url: https://openrouter.ai/api/v1
site_url: https://chat-agent.local
# null = app.openrouter_site_name or agent name fallback.
site_name: null
model: google/gemini-2.5-flash-lite

# OpenRouter model metadata ceiling: 65535 output tokens.
# Keep this profile in the range 1..65535.
max_tokens: 65535
# HTTP timeout in seconds. Must be > 0 when set.
request_timeout: 120.0
# Sampling temperature. OpenRouter docs: 0.0 to 2.0. null = provider default.
temperature: null
# Whether the app may send image inputs to this profile.
vision: true

# Optional upstream pinning. null = OpenRouter default routing.
provider_routing: null

# Gemini 2.5 Flash Lite reasoning controls.
reasoning:
  # Enables provider-side reasoning/thinking.
  enabled: true
  # Gemini 2.5 native thinkingBudget range is 512..24576 tokens.
  # This adapter enforces the OpenRouter minimum of 1024, so practical range is
  # 1024..24576 when you set an explicit reasoning budget.
  # This profile pins the budget to the documented maximum.
  max_tokens: 24576
  # OpenRouter can derive Gemini 2.5 thinkingBudget from these effort levels:
  # minimal, low, medium, high, xhigh.
  effort: null
  supported_efforts:
    - minimal
    - low
    - medium
    - high
    - xhigh

# OpenRouter top-level output/detail control.
# OpenRouter model metadata does not expose verbosity for this route.
verbosity: null
