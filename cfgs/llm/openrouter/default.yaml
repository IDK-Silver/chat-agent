# OpenRouter LLM Configuration
# Unified API access to multiple LLM providers (OpenAI, Anthropic, Meta, etc.)
# See available models: https://openrouter.ai/models

provider: openrouter

# Model identifier in format: provider/model
# Examples: openai/gpt-4o, anthropic/claude-3.5-sonnet, meta-llama/llama-3-70b
model: google/gemini-3-pro-preview

# API key: use api_key for direct value, api_key_env for environment variable name
# api_key: sk-or-xxx
api_key_env: OPENROUTER_API_KEY

# API base URL (usually no need to change)
# base_url: https://openrouter.ai/api/v1

# Maximum tokens in response
max_tokens: 4096

# HTTP request timeout in seconds
request_timeout: 120.0
