provider: deepseek
model: deepseek-v4-flash

# API key is resolved from .env or the process environment.
api_key_env: DEEPSEEK_API_KEY

# DeepSeek OpenAI-format API root.
# The client appends /chat/completions.
base_url: https://api.deepseek.com

# Keep provider default output cap.
# DeepSeek docs currently publish a maximum output of 384K for V4 models,
# but this profile intentionally avoids a hard cap unless the caller needs one.
max_tokens: null

# DeepSeek may keep requests connected while waiting for inference.
# Use a longer timeout than ordinary short-context providers.
request_timeout: 600.0

# Thinking mode ignores temperature, so this must stay null when enabled.
temperature: null

# DeepSeek V4 API profiles are text-only for this adapter.
vision: false

thinking:
  # DeepSeek thinking mode maps to body: thinking.type=enabled.
  enabled: true
  # Highest documented effort. low/medium map to high and xhigh maps to max,
  # so use the explicit supported value.
  effort: max
