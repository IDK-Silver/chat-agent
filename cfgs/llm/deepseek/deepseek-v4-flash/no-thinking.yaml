provider: deepseek
model: deepseek-v4-flash

# API key is resolved from .env or the process environment.
api_key_env: DEEPSEEK_API_KEY

# DeepSeek OpenAI-format API root.
# The client appends /chat/completions.
base_url: https://api.deepseek.com

# Keep provider default output cap.
# Set an integer here only when a caller needs a stricter output limit.
max_tokens: null

# DeepSeek may keep requests connected while waiting for inference.
request_timeout: 600.0

# Temperature is only allowed in this adapter when thinking is disabled.
# null keeps DeepSeek's provider default.
temperature: null

# DeepSeek V4 API profiles are text-only for this adapter.
vision: false

thinking:
  # DeepSeek non-thinking mode maps to body: thinking.type=disabled.
  enabled: false
