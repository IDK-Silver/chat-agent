# OpenAI LLM Configuration
# Supports OpenAI API and compatible endpoints (Azure, local servers)

provider: openai

# Model identifier (e.g., gpt-4o, gpt-4-turbo, gpt-3.5-turbo)
model: gpt-4o

# API key: use api_key for direct value, api_key_env for environment variable name
# api_key: sk-xxx
api_key_env: OPENAI_API_KEY

# API base URL
# Default: https://api.openai.com/v1
# For Azure: https://{resource}.openai.azure.com/openai/deployments/{deployment}
# base_url: https://api.openai.com/v1

# Maximum tokens in response
max_tokens: 4096
