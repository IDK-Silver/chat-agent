# Claude Code native proxy template.
provider: claude_code
# Replace with the Claude model id used by Claude Code.
model: claude-sonnet-4-6
# Native proxy root. The client appends /v1/messages.
base_url: http://localhost:4142
# Output token cap for this profile.
max_tokens: 128000
# HTTP timeout in seconds.
request_timeout: 600.0
# Sampling temperature. Claude Code only sends this when thinking is disabled.
temperature: 1.0
# Whether the app may send image inputs to this profile.
vision: true

# Native Claude Code thinking payload. null = do not send thinking.
thinking: null
# Examples:
# thinking:
#   type: adaptive
#
# thinking:
#   type: disabled
#
# thinking:
#   type: enabled
#   budget_tokens: 2048

# Native Claude Code output_config block. null = do not send output_config.
output_config: null
# Example:
# output_config:
#   effort: medium
