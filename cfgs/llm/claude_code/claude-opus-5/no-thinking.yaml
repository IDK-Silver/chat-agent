# Claude Code native proxy profile for Claude Opus 5 with thinking disabled.
provider: claude_code
# Upstream model id used by Claude Code.
model: claude-opus-5
# Native proxy root. The client appends /v1/messages.
base_url: http://localhost:4142
# Output token cap for this profile.
max_tokens: 128000
# HTTP timeout in seconds.
request_timeout: 600.0
# Sampling temperature. Claude Code only sends this when thinking is disabled.
temperature: 1.0
# Whether the app may send image inputs to this profile.
vision: true

# Opus 5 defaults to adaptive thinking; type must be set explicitly to disable it.
thinking:
  type: disabled

# Upstream rejects disabled thinking above effort high, so keep this profile at or below high.
output_config:
  effort: low
