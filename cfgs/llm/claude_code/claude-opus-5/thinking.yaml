# Claude Code native proxy profile for Claude Opus 5 with adaptive thinking.
provider: claude_code
# Upstream model id used by Claude Code.
model: claude-opus-5
# Native proxy root. The client appends /v1/messages.
base_url: http://localhost:4142
# Output token cap for this profile.
max_tokens: 128000
# HTTP timeout in seconds.
request_timeout: 600.0
# Sampling temperature. Claude Code omits temperature when thinking is active.
temperature: 1.0
# Whether the app may send image inputs to this profile.
vision: true

# Opus 5 thinks by default; adaptive is stated explicitly to keep the payload self-describing.
thinking:
  type: adaptive

# Native Claude Code output_config payload for this profile.
output_config:
  effort: high
