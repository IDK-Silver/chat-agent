server:
  host: "127.0.0.1"
  port: 9000

restart:
  enabled: false
  interval_hours: 12

processes:
  copilot-proxy:
    enabled: true
    command: ["uv", "run", "copilot-proxy"]
    cwd: null
    auto_restart: true
    startup_delay: 1
    health_check_url: "http://127.0.0.1:4141/health"
    health_check_timeout: 30
    log_output: true

  chat-cli:
    enabled: true
    command: ["uv", "run", "chat-cli"]
    cwd: null
    control_url: "http://127.0.0.1:9001"
    shutdown_timeout: 1200
    auto_restart: true
    join_restart_cycle: true
    depends_on: ["copilot-proxy"]
    log_output: false
    start_new_session: false

upgrade:
  auto_check: true
  check_interval_minutes: 1
  branch: "main"
  post_pull: ["uv", "sync"]
  self_watch_paths: ["src/chat_supervisor/"]
