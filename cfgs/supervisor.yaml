server:
  host: "127.0.0.1"
  port: 9000

restart:
  interval_hours: 12

processes:
  copilot-api:
    enabled: false
    command: ["bun", "run", "start", "start"]
    cwd: "../copilot-api"
    auto_restart: true
    startup_delay: 3
    health_check_url: "http://127.0.0.1:4141/v1/models"
    health_check_timeout: 30
    log_output: true

  chat-cli:
    enabled: true
    command: ["uv", "run", "chat-cli", "--user", "yufeng"]
    cwd: null
    control_url: "http://127.0.0.1:9001"
    shutdown_timeout: 1200
    auto_restart: true
    join_restart_cycle: true
    depends_on: ["copilot-api"]
    log_output: false

upgrade:
  auto_check: true
  check_interval_minutes: 1
  branch: "main"
  post_pull: ["uv", "sync"]
  self_watch_paths: ["src/chat_supervisor/"]
