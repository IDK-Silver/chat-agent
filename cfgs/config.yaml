# App
working_dir: ".agent"
debug: true
show_tool_use: true
warn_on_failure: true

# Tool security
tools:
  allowed_paths: []
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 30

# Agents
agents:
  brain:
    llm: llm/openrouter/google-gemini-3-flash-preview/thinking.yaml
    llm_request_timeout: 180
    llm_timeout_retries: 2
    warn_on_failure: true

  init:
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true

  memory_searcher:
    enabled: true
    llm: llm/openrouter/x-ai-grok-4.1-fast/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    pre_parse_retries: 1
    context_bytes_limit: null
    max_results: null

  memory_editor:
    enabled: true
    llm: llm/openrouter/x-ai-grok-4.1-fast/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    post_parse_retries: 2

  post_reviewer:
    enabled: true
    llm: llm/openrouter/x-ai-grok-4.1-fast/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    allow_unresolved: true
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 5
    history_turns: 6                 # 送審時附帶幾輪歷史對話
    history_turn_max_chars: 2048     # 每輪歷史摘要及用戶訊息的字元上限
    reply_max_chars: 3000            # 送審時 agent 回應內容的截斷上限
    tool_preview_max_chars: 180      # 工具呼叫摘要的字元上限

  shutdown_reviewer:
    enabled: true
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    allow_unresolved: true
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 5
    history_turns: 6
    history_turn_max_chars: 2048
    reply_max_chars: 3000
    tool_preview_max_chars: 180
