# App
working_dir: ".agent"
debug: false
show_tool_use: true
warn_on_failure: true

# Context window management
context:
  max_chars: 150000
  preserve_turns: 8
  # Files injected into every LLM call as persistent context.
  # {current_user} is resolved to the active user ID at runtime.
  boot_files:
    - "memory/agent/persona.md"
    - "memory/agent/inner-state.md"
    - "memory/agent/short-term.md"
    - "memory/agent/long-term.md"
    - "memory/people/{current_user}/index.md"
    - "memory/agent/pending-thoughts.md"
    - "memory/agent/skills/index.md"
    - "memory/agent/interests/index.md"

# Session persistence
session:
  replay_turns: null        # resume 時顯示最近 N 輪，null = 全部
  show_tool_calls: false    # resume 時是否顯示 tool call 細節

# Lifecycle hooks
hooks:
  memory_archive:
    max_lines: 500
    retain_days: 2

# Feature flags
features:
  copilot_agent_hint: true

# Tool security
tools:
  allowed_paths:
    - "~"
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 600
  memory_edit:
    allow_failure: true
  memory_search:
    allow_failure: true

# Agents
agents:
  brain:
    llm: llm/copilot-api/gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 180
    llm_timeout_retries: 2
    warn_on_failure: true

  init:
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true

  memory_searcher:
    enabled: true
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    pre_parse_retries: 1
    context_bytes_limit: 600
    max_results: null

  vision:
    enabled: true
    llm: llm/copilot-api/gemini-3-flash-preview/no-thinking.yaml
    llm_request_timeout: 60
    llm_timeout_retries: 1
    warn_on_failure: true

  memory_editor:
    enabled: true
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    post_parse_retries: 2

  post_reviewer:
    enabled: true
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    allow_unresolved: true
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 5
    history_turns: 6                 # 送審時附帶幾輪歷史對話
    history_turn_max_chars: 2048     # 每輪歷史摘要及用戶訊息的字元上限
    reply_max_chars: 3000            # 送審時 agent 回應內容的截斷上限
    tool_preview_max_chars: 180      # 工具呼叫摘要的字元上限

  shutdown_reviewer:
    enabled: false
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    allow_unresolved: true
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 5
    history_turns: 6
    history_turn_max_chars: 2048
    reply_max_chars: 3000
    tool_preview_max_chars: 180

  gui_manager:
    enabled: true
    llm: llm/openrouter/google-gemini-3-pro-preview/thinking.yaml
    llm_request_timeout: 180
    llm_timeout_retries: 2
    warn_on_failure: true
    max_steps: 100                           # GUI agentic loop 最大步數
    gui_intent_max_chars: null               # gui_task 意圖顯示截斷
    gui_instruction_max_chars: 400           # ask_worker 指令截斷
    gui_text_max_chars: 200                  # type_text 文字截斷
    gui_worker_result_max_chars: 200         # worker 觀察結果截斷
    gui_result_max_chars: 200                # 一般結果截斷
    screenshot_max_width: 1000               # 截圖最大寬度（等比縮放）
    screenshot_quality: 70                   # JPEG 壓縮品質（1-100）

  gui_worker:
    enabled: true
    llm: llm/copilot-api/gemini-3-flash-preview/no-thinking.yaml
    llm_request_timeout: 60
    llm_timeout_retries: 1
    warn_on_failure: true
