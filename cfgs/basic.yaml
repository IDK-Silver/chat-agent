# App
working_dir: ".agent"
debug: false
warn_on_failure: true

# Tool security
tools:
  allowed_paths: []
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 30

# Agents
agents:
  brain:
    llm: llm/ollama/gemini-3-flash-preview/think-high.yaml
    llm_request_timeout: 180
    llm_timeout_retries: 2
    warn_on_failure: true

  init:
    llm: llm/openrouter/default.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true

  pre_reviewer:
    llm: llm/ollama/glm-4.7/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    pre_parse_retries: 2
    enforce_memory_path_constraints: true
    max_prefetch_actions: 5
    max_files_per_grep: 3
    shell_whitelist: ["grep", "cat", "ls", "find", "wc"]

  post_reviewer:
    llm: llm/ollama/glm-4.7/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 5
    history_turns: 6                 # 送審時附帶幾輪歷史對話
    history_turn_max_chars: 2048     # 每輪歷史摘要及用戶訊息的字元上限
    reply_max_chars: 3000            # 送審時 agent 回應內容的截斷上限
    tool_preview_max_chars: 180      # 工具呼叫摘要的字元上限
    label_confidence_threshold: 0.75

  shutdown_reviewer:
    llm: llm/ollama/glm-4.7/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    post_parse_retries: 2
    max_post_retries: 2
    history_turns: 6
    history_turn_max_chars: 2048
    reply_max_chars: 3000
    tool_preview_max_chars: 180
    label_confidence_threshold: 0.75

  memory_writer:
    llm: llm/ollama/glm-4.7/no-thinking.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    writer_parse_retries: 1
    writer_max_retries: 2
