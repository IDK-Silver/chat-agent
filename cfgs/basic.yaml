working_dir: ".agent"
debug: true

tools:
  allowed_paths: []
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"  # Fork bomb
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 30

agents:
  brain:
    llm: llm/ollama/default.yaml
  init:
    llm: llm/openrouter/default.yaml
  pre_reviewer:
    llm: llm/ollama/glm-4.7.yaml
    max_prefetch_actions: 5
    max_files_per_grep: 3
    shell_whitelist: ["grep", "cat", "ls", "find", "wc"]
  post_reviewer:
    llm: llm/ollama/kimi-k2.5.yaml
    max_post_retries: 2
