working_dir: ".agent"
debug: false
warn_on_failure: true

tools:
  allowed_paths: []
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"  # Fork bomb
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 30

agents:
  brain:
    llm: llm/ollama/default.yaml
    llm_request_timeout: 180
    llm_timeout_retries: 2
  init:
    llm: llm/openrouter/default.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
  pre_reviewer:
    llm: llm/ollama/glm-4.7.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    pre_parse_retries: 2
    enforce_memory_path_constraints: true
    warn_on_failure: true
    max_prefetch_actions: 5
    max_files_per_grep: 3
    shell_whitelist: ["grep", "cat", "ls", "find", "wc"]
  post_reviewer:
    llm: llm/ollama/glm-4.7.yaml
    llm_request_timeout: 120
    llm_timeout_retries: 1
    warn_on_failure: true
    max_post_retries: 5
