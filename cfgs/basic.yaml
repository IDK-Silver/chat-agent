working_dir: ".agent"

tools:
  allowed_paths: []
  shell:
    blacklist:
      - "rm\\s+-rf\\s+/"
      - ":(\\s*)\\{\\s*:\\|:\\s*&\\s*\\}\\s*;"  # Fork bomb
      - "mkfs\\."
      - "dd\\s+if=.*/dev/(zero|random)"
      - "> /dev/sd"
    timeout: 30

agents:
  brain:
    llm: llm/ollama/default.yaml
  init:
    llm: llm/ollama/default.yaml
